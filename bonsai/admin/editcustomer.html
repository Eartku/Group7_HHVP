    <!-- Hero -->
    <div class="hero">

      </div>

    <!-- Edit Form -->
    <div class="untree_co-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8" >
            <div class="p-4 p-lg-5 border bg-white rounded-3 shadow-sm" style="height: calc(95%);">
              
              <div class="text-center mb-4">
                <div class="avatar-wrapper position-relative d-inline-block">
                  <img
                    src="../images/post-1(1).jpg"
                    alt="Avatar"
                    class="rounded-circle shadow avatar-img"
                    width="120"
                    height="120"
                  />
                  <div class="position-absolute bottom-0 end-0">
                    <label for="uploadAvatar" class="btn btn-sm btn-dark rounded-circle" style="width:35px;height:35px;">
                      <i class="fas fa-camera"></i>
                    </label>
                    <input id="uploadAvatar" type="file" class="d-none" />
                  </div>
                </div>
                <h4 class="mt-3 text-black fw-bold">Nguyễn Hoàng Phúc</h4>
              </div>

              <form>
                <div class="mb-3">
                  <label class="form-label fw-bold">Mã khách hàng</label>
                  <input type="text" class="form-control" value="#C0001" readonly />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Họ tên</label>
                  <input type="text" class="form-control" value="Nguyễn Hoàng Phúc" />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Username</label>
                  <input type="text" class="form-control" value="phucdepzai" />
                </div>

                <div class="mb-3 position-relative">
                <label class="form-label fw-bold">Mật khẩu</label>
                <div class="input-group">
                    <input
                    type="password"
                    id="password"
                    class="form-control"
                    value="nguyenhoangphuc69"
                    readonly
                    />
                    <!-- Nút show/hide -->
                    <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="togglePassword()"
                    title="Hiện / Ẩn mật khẩu"
                    >
                    <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                    <!-- Nút đổi -->
                    <button
                    type="button"
                    class="btn btn-success"
                    onclick="changePassword()"
                    title="Đổi mật khẩu"
                    >
                    <i class="fas fa-pen me-1"></i> Đổi
                    </button>
                </div>
                </div>

                <script>
                function togglePassword() {
                    const input = document.getElementById("password");
                    const icon = document.getElementById("eyeIcon");
                    if (input.type === "password") {
                    input.type = "text";
                    icon.classList.replace("fa-eye", "fa-eye-slash");
                    } else {
                    input.type = "password";
                    icon.classList.replace("fa-eye-slash", "fa-eye");
                    }
                }

                function changePassword() {
                    const input = document.getElementById("password");
                    const newPass = prompt("🔒 Nhập mật khẩu mới:");
                    alert("✅ Mật khẩu đã được cập nhật!");
                    }
                </script>


                <div class="mb-3">
                  <label class="form-label fw-bold">Email</label>
                  <input type="email" class="form-control" value="nguyenhoangphuc@gmail.com" />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Số điện thoại</label>
                  <input type="tel" class="form-control" value="0909xxxxxxx" />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Địa chỉ giao hàng</label>
                  <input type="text" class="form-control" value="180 Bùi Văn Ba, Quận 7, TP.HCM" />
                </div>

                <div class="btn-group w-100" role="group" aria-label="Trạng thái khách hàng" style="margin-bottom: 10px;">
                    <input type="radio" class="btn-check" name="status" id="active" autocomplete="off" checked onclick="changeStatus('active')">
                    <label class="btn btn-outline-success" for="active">
                        <i class="fas fa-user-check me-1"></i> Hoạt động
                    </label>

                    <input type="radio" class="btn-check" name="status" id="locked" autocomplete="off" onclick="changeStatus('locked')">
                    <label class="btn btn-outline-danger" for="locked">
                        <i class="fas fa-lock me-1"></i> Bị khóa
                    </label>

                    <input type="radio" class="btn-check" name="status" id="warning" autocomplete="off" onclick="changeStatus('warning')">
                    <label class="btn btn-outline-warning" for="warning">
                        <i class="fas fa-exclamation-triangle me-1"></i> Cảnh báo
                    </label>
                    </div>

                    <script>
                    function changeStatus(status) {
                    if (status === "locked") {
                        if (!confirm("🔒 Bạn có chắc muốn khóa khách hàng này không?")) {
                        document.getElementById("active").checked = true;
                        return;
                        }
                        alert("✅ Khách hàng đã bị khóa.");
                    }
                    else if (status === "warning") {
                        alert("⚠️ Khách hàng đã được chuyển sang trạng thái cảnh báo.");
                    }
                    else if (status === "active") {
                        alert("🟢 Khách hàng đã được kích hoạt lại.");
                    }
                    }
                    </script>


                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Ngày tham gia</label>
                    <input type="date" class="form-control" value="2023-09-12" />
                  </div>

                  <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Tổng đơn hàng</label>
                    <input type="number" class="form-control" value="15" readonly />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Tổng chi tiêu (VNĐ)</label>
                    <input type="text" class="form-control" value="5230000" readonly/>
                  </div>
                </div>

                </div>

                <div class="text-center mt-4">
                  <a href="customerdetail.html" class="btn btn-dark me-2">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại
                  </a>
                    <button type="button" class="btn btn-success" onclick="confirmSave()">
                    <i class="fas fa-save me-1"></i> Lưu thay đổi
                    </button>

                    <script>
                    function confirmSave() {
                        if (confirm("Bạn có chắc muốn lưu thay đổi này không?")) {
                        window.location.href = "customerdetail.html"; // chuyển trang
                        }
                    }
                    </script>
                </div>
              </form>
