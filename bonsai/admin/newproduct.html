    <!-- Edit Form Section -->
    <div class="edit-container">
      <h2 class="text-center mb-4 text-success">Thông tin sản phẩm mới</h2>

      <div class="product-preview">
        <img src="  " alt="Ảnh sản phẩm" />
      </div>
      <form>
        <div class="mb-3">
          <label class="form-label">Ảnh sản phẩm</label>
          <input type="file" class="form-control" name="productImage" />
        </div>
        <div class="mb-3">
          <label class="form-label">Mã sản phẩm</label>
          <input
            type="text"
            class="form-control"
            name="productName"
            value=" "
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Tên sản phẩm</label>
          <input
            type="text"
            class="form-control"
            name="productName"
            value=" "
            required
          />
        </div>
        <!-- Phân loại cây -->
        <div class="mb-3">
          <label class="form-label">Phân loại cây</label>
          <select class="form-select" name="productCategory" required>
            <option value="">-- Chọn loại cây --</option>
            <option value="bonsai">Cây để phòng</option>
            <option value="cay-canh-mini">Cây để bàn</option>
            <option value="cay-phong-thuy">Cây cây treo tường</option>
          </select>
        </div>
        <!-- Giá vốn -->
        <div class="mb-3">
          <label class="form-label">Giá vốn (VNĐ)</label>
          <input
            type="number"
            class="form-control"
            name="productCost"
            value=" "
            required
          />
        </div>
        <!-- Giá bán -->
        <div class="mb-3">
          <label class="form-label">Giá bán (VNĐ)</label>
          <input
            type="number"
            class="form-control"
            name="productPrice"
            value=" "
            required
          />
        </div>
        <!-- ✅ Thêm phần số lượng trong kho -->
        <div class="mb-3">
          <label class="form-label">Số lượng trong kho</label>
          <input
            type="number"
            class="form-control"
            name="productStock"
            value=" "
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Mô tả sản phẩm</label>
          <textarea
            class="form-control"
            name="productDesc"
            rows="3"
            placeholder="Nhập mô tả sản phẩm..."
          ></textarea>
        </div>
        <!-- Ngày nhập -->
        <div class="mb-3">
          <label class="form-label">Ngày nhập</label>
          <input type="date" class="form-control" name="productDate" required />
        </div>
        <div class="d-flex justify-content-between mt-4">
          <a href="admin_product.html" class="btn btn-secondary w-50 me-2"
            >Quay lại</a
          >
          <button
            type="button"
            class="btn btn-success w-50"
            onclick="confirmSave()"
          >
            Lưu
          </button>
        </div>
      </form>
