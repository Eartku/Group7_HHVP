    <!-- Hero -->
    <div class="hero">
      <div class="center-row text-center">
        <h1 class="glow">CHỈNH SỬA ĐƠN HÀNG</h1>
      </div>
    </div>

    <!-- Edit Form -->
    <div class="untree_co-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div class="p-4 p-lg-5 border bg-white rounded-3 shadow-sm">
              <form>
                <div class="mb-3">
                  <label class="form-label fw-bold">Mã đơn hàng</label>
                  <input
                    type="text"
                    class="form-control"
                    value="#P001"
                    readonly
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Tên sản phẩm</label>
                  <input
                    type="text"
                    class="form-control"
                    value="Môn cảnh, rau má"
                    readonly
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Tên Khách hàng</label>
                  <input
                    type="text"
                    class="form-control"
                    value="Trần Nhựt Huy"
                    readonly
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    value="trannhuthuy@gmail.com"
                    readonly
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">Số điện thoại</label>
                  <input type="tel" class="form-control" value="0909xxxxxxx" readonly />
                  
                </div>

                <div class="row">
                   <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Địa chỉ giao hàng</label>
                  <input
                    type="text"
                    class="form-control"
                    value="320 Trần Bình Trọng, Quận 7, TP.HCM"
                    readonly
                  />
                  </div>
                  <div class="col-md-6 mb-3">
                   <label class="form-label fw-bold">Phương Thức thanh toán</label>
                  <input
                    type="text"
                    class="form-control"
                    value="Tiền mặt khi nhận hàng (COD)"
                    readonly
                  />
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Trạng thái</label>
                    <select class="form-select">
                      <option selected>Mới đặt</option> 
                      <option>đã xử lý</option>
                      <option>đã giao</option>
                      <option>Hủy</option>
                    </select>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Ngày đặt</label>
                    <input
                      type="date"
                      class="form-control"
                      value="2023-09-12"
                      readonly
                    />
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Tổng giá</label>
                    <input type="text" class="form-control" value="137.000đ" readonly/>
                  </div>
                    <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Tổng đơn hàng</label>
                    <input
                      type="number"
                      class="form-control"
                      value="2"
                      readonly
                    />
                    </div>
                  </div>
                </div>
                <div class="text-center mt-4">
                  <a href="orderdetails.html" class="btn btn-dark me-2">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại
                  </a>
                    <button type="button" class="btn btn-success" onclick="confirmSave()">
                    <i class="fas fa-save me-1"></i> Lưu thay đổi
                    </button>

                    <script>
                    function confirmSave() {
                        if (confirm("Bạn có chắc muốn lưu thay đổi này không?")) {
                        window.location.href = "orderdetails.html"; // chuyển trang
                        }
                    }
                    </script>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

            Copyright &copy;

              document.write(new Date().getFullYear());

            . All Rights Reserved. — Designed by
            <a href="group7.html" class="text-light text-decoration-underline"
              >Group 7</a
            >

        </div>

    <!-- End Footer -->
