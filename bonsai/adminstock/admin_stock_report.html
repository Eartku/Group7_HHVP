<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BonSai | Báo Cáo Tồn Kho</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --green-dark:  #1b4332;
      --green-mid:   #2d6a4f;
      --green-light: #52b788;
      --green-pale:  #d8f3dc;
      --amber:       #f4a261;
      --red:         #e63946;
      --bg:          #f0f7f4;
      --card:        #ffffff;
      --border:      #b7e4c7;
      --text:        #1b2e22;
      --muted:       #6c8870;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--green-dark);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .topbar .logo { font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: 1px; }
    .topbar .logo span { color: var(--green-light); }
    .topbar a {
      color: #b7e4c7;
      text-decoration: none;
      font-size: .85rem;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .topbar a:hover { color: #fff; }

    /* ── LAYOUT ── */
    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    /* ── PAGE TITLE ── */
    .page-title {
      text-align: center;
      margin-bottom: 36px;
    }
    .page-title h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--green-dark);
    }
    .page-title p { color: var(--muted); margin-top: 6px; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 11px 26px;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: var(--card);
      cursor: pointer;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 600;
      color: var(--muted);
      transition: all .25s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tab-btn:hover { border-color: var(--green-light); color: var(--green-mid); }
    .tab-btn.active {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: #fff;
    }

    /* ── PANEL ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 32px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--green-pale);
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .card-title i { color: var(--green-light); }

    /* ── FORM ROW ── */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
    .form-group label { font-size: .82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .form-group select,
    .form-group input {
      padding: 11px 15px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: .95rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    .form-group select:focus,
    .form-group input:focus { border-color: var(--green-light); }

    /* ── BUTTON ── */
    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all .22s;
    }
    .btn-primary { background: var(--green-dark); color: #fff; }
    .btn-primary:hover { background: var(--green-mid); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── RESULT SECTION ── */
    .result-section { margin-top: 24px; }

    /* ── STAT PILLS ── */
    .stat-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-pill {
      flex: 1;
      min-width: 130px;
      background: var(--green-pale);
      border-radius: 14px;
      padding: 16px 20px;
      text-align: center;
    }
    .stat-pill .val { font-size: 2rem; font-weight: 800; color: var(--green-dark); }
    .stat-pill .lbl { font-size: .78rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .stat-pill.amber { background: #fff3e0; }
    .stat-pill.amber .val { color: #d97706; }
    .stat-pill.red { background: #fdecea; }
    .stat-pill.red .val { color: var(--red); }
    .stat-pill.blue { background: #e8f4fd; }
    .stat-pill.blue .val { color: #1a73e8; }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--border); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }
    thead { background: var(--green-dark); }
    thead th {
      padding: 12px 16px;
      color: #fff;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #edf7f0; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--green-pale); }
    td {
      padding: 11px 16px;
      text-align: center;
      color: var(--text);
      vertical-align: middle;
    }
    td.left { text-align: left; }

    /* ── BADGE ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 700;
    }
    .badge-import  { background: #d1fae5; color: #065f46; }
    .badge-export  { background: #fee2e2; color: #991b1b; }
    .badge-low     { background: #fff3cd; color: #92400e; }
    .badge-out     { background: #fde8e8; color: #9b1c1c; }
    .badge-ok      { background: #d1fae5; color: #065f46; }
    .badge-size    { background: #e0f2fe; color: #0369a1; font-size: .75rem; padding: 2px 8px; }

    /* ── THRESHOLD INPUT SPECIAL ── */
    .threshold-hint {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── EMPTY / LOADING ── */
    .empty-msg {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
    }
    .empty-msg i { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ALERT BANNER ── */
    .alert-banner {
      padding: 14px 20px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alert-banner.warning { background: #fff8e1; color: #78350f; border: 1px solid #fcd34d; }
    .alert-banner.danger  { background: #fef2f2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .alert-banner.info    { background: #eff6ff; color: #1e3a5f; border: 1px solid #93c5fd; }

    /* ── RUNNING BALANCE ── */
    .balance-pos { color: #065f46; font-weight: 700; }
    .balance-neg { color: #991b1b; font-weight: 700; }

    @media (max-width: 640px) {
      .card { padding: 20px 16px; }
      .tabs { gap: 8px; }
      .tab-btn { padding: 9px 16px; font-size: .85rem; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">BON<span>SAI</span> 🌿</div>
  <a href="admin_stock1.html"><i class="fas fa-arrow-left"></i> Quay lại Quản lý Kho</a>
</div>

<div class="shell">

  <div class="page-title">
    <h1>📊 Thống Kê & Báo Cáo Kho</h1>
    <p>Tra cứu tồn kho – Báo cáo nhập xuất – Cảnh báo sắp hết hàng</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-stock">
      <i class="fas fa-search"></i> Tồn tại thời điểm
    </button>
    <button class="tab-btn" data-tab="tab-report">
      <i class="fas fa-exchange-alt"></i> Báo cáo Nhập – Xuất
    </button>
    <button class="tab-btn" data-tab="tab-alert">
      <i class="fas fa-bell"></i> Cảnh báo sắp hết
    </button>
  </div>

  <!-- ═══ PANEL 1: TỒN TẠI THỜI ĐIỂM ═══ -->
  <div id="tab-stock" class="panel active">
    <div class="card">
      <div class="card-title"><i class="fas fa-history"></i> Tra cứu tồn kho tại một thời điểm</div>
      <div class="form-row">
        <div class="form-group" style="flex:2; min-width:220px;">
          <label>Sản phẩm</label>
          <select id="s1-product">
            <option value="">-- Đang tải... --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Size</label>
          <select id="s1-size">
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ngày / Giờ</label>
          <input type="datetime-local" id="s1-date" />
        </div>
        <div class="form-group" style="flex:0; min-width:auto;">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="s1-btn" onclick="queryStockAtTime()">
            <i class="fas fa-search"></i> Tra cứu
          </button>
        </div>
      </div>
    </div>

    <div id="s1-result" class="result-section" style="display:none;"></div>
  </div>

  <!-- ═══ PANEL 2: BÁO CÁO NHẬP XUẤT ═══ -->
  <div id="tab-report" class="panel">
    <div class="card">
      <div class="card-title"><i class="fas fa-chart-bar"></i> Báo cáo nhập – xuất theo khoảng thời gian</div>
      <div class="form-row">
        <div class="form-group" style="flex:2; min-width:220px;">
          <label>Sản phẩm (tùy chọn)</label>
          <select id="s2-product">
            <option value="">-- Tất cả sản phẩm --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Size (tùy chọn)</label>
          <select id="s2-size">
            <option value="">-- Tất cả --</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
          </select>
        </div>
        <div class="form-group">
          <label>Từ ngày</label>
          <input type="date" id="s2-from" />
        </div>
        <div class="form-group">
          <label>Đến ngày</label>
          <input type="date" id="s2-to" />
        </div>
        <div class="form-group" style="flex:0; min-width:auto;">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="s2-btn" onclick="queryReport()">
            <i class="fas fa-chart-bar"></i> Xem báo cáo
          </button>
        </div>
      </div>
    </div>

    <div id="s2-result" class="result-section" style="display:none;"></div>
  </div>

  <!-- ═══ PANEL 3: CẢNH BÁO ═══ -->
  <div id="tab-alert" class="panel">
    <div class="card">
      <div class="card-title"><i class="fas fa-exclamation-triangle"></i> Cảnh báo sản phẩm sắp hết hàng</div>
      <div class="form-row">
        <div class="form-group">
          <label>Ngưỡng cảnh báo (số lượng ≤)</label>
          <input type="number" id="s3-threshold" value="10" min="0" placeholder="Ví dụ: 10" />
          <span class="threshold-hint">Sản phẩm có tồn kho ≤ con số này sẽ bị cảnh báo</span>
        </div>
        <div class="form-group">
          <label>Gồm cả hết hàng (= 0)?</label>
          <select id="s3-include-out">
            <option value="true">Có – bao gồm hết hàng</option>
            <option value="false">Không – chỉ sắp hết</option>
          </select>
        </div>
        <div class="form-group" style="flex:0; min-width:auto;">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="s3-btn" onclick="queryAlerts()">
            <i class="fas fa-bell"></i> Kiểm tra
          </button>
        </div>
      </div>
    </div>

    <div id="s3-result" class="result-section" style="display:none;"></div>
  </div>

</div><!-- /shell -->

<script>
  // ─── CONFIG ─────────────────────────────────────────────────────────────
  const API = '../api/inventory_api.php';;

  // ─── TABS ────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  // ─── SET DEFAULTS ────────────────────────────────────────────────────────
  (() => {
    const now   = new Date();
    const pad   = n => String(n).padStart(2,'0');
    const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    document.getElementById('s1-date').value = local;

    const today = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const mo    = new Date(now); mo.setMonth(mo.getMonth()-1);
    const moStr = `${mo.getFullYear()}-${pad(mo.getMonth()+1)}-${pad(mo.getDate())}`;
    document.getElementById('s2-from').value = moStr;
    document.getElementById('s2-to').value   = today;
  })();

  // ─── LOAD PRODUCTS ───────────────────────────────────────────────────────
  async function loadProducts() {
    try {
      const res  = await fetch(`${API}?action=products`);
      const data = await res.json();
      if (!data.success) return;
      ['s1-product','s2-product'].forEach(id => {
        const sel = document.getElementById(id);
        const hasAll = id === 's2-product';
        sel.innerHTML = hasAll ? '<option value="">-- Tất cả sản phẩm --</option>' : '<option value="">-- Chọn sản phẩm --</option>';
        data.products.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = `${p.name} ${p.category ? '['+p.category+']' : ''}`;
          opt.dataset.sizes = p.available_sizes || '';
          sel.appendChild(opt);
        });
      });
    } catch(e) {
      console.error('Failed to load products', e);
    }
  }
  loadProducts();

  // ─── UTILITY ─────────────────────────────────────────────────────────────
  function setLoading(btnId, on) {
    const btn = document.getElementById(btnId);
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span> Đang tải...'
      : (btnId === 's1-btn' ? '<i class="fas fa-search"></i> Tra cứu'
        : btnId === 's2-btn' ? '<i class="fas fa-chart-bar"></i> Xem báo cáo'
        : '<i class="fas fa-bell"></i> Kiểm tra');
  }

  function showResult(divId, html) {
    const el = document.getElementById(divId);
    el.innerHTML = html;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function fmtNum(n) { return Number(n).toLocaleString('vi-VN'); }
  function fmtCurrency(n) { return Number(n).toLocaleString('vi-VN') + ' ₫'; }

  // ─── 1. TỒN TẠI THỜI ĐIỂM ────────────────────────────────────────────────
  async function queryStockAtTime() {
    const pid  = document.getElementById('s1-product').value;
    const size = document.getElementById('s1-size').value;
    const dt   = document.getElementById('s1-date').value;

    if (!pid)  return alert('Vui lòng chọn sản phẩm!');
    if (!size) return alert('Vui lòng chọn size!');
    if (!dt)   return alert('Vui lòng chọn ngày giờ!');

    setLoading('s1-btn', true);
    try {
      const url = `${API}?action=stock_at_time&product_id=${pid}&size=${size}&date=${dt.replace('T',' ')}:00`;
      const res  = await fetch(url);
      const data = await res.json();
      if (!data.success) { showResult('s1-result', errCard(data.error)); return; }

      const stockClass = data.stock_at_time <= 0 ? 'red' : data.stock_at_time <= 10 ? 'amber' : '';

      const logsHtml = data.logs.length === 0
        ? '<tr><td colspan="6"><div class="empty-msg"><i class="fas fa-inbox"></i>Không có giao dịch nào trước thời điểm này</div></td></tr>'
        : data.logs.map(l => `
            <tr>
              <td>${l.created_at_fmt}</td>
              <td><span class="badge badge-${l.type === 'import' ? 'import' : 'export'}">${l.type === 'import' ? 'Nhập' : 'Xuất'}</span></td>
              <td style="font-weight:700; color:${l.type==='import'?'#065f46':'#991b1b'}">${l.quantity_display}</td>
              <td class="${l.balance > 0 ? 'balance-pos' : 'balance-neg'}">${fmtNum(l.balance)}</td>
              <td>${l.note || '—'}</td>
            </tr>`).join('');

      showResult('s1-result', `
        <div class="stat-row">
          <div class="stat-pill ${stockClass}">
            <div class="val">${fmtNum(data.stock_at_time)}</div>
            <div class="lbl">Tồn tại thời điểm</div>
          </div>
          <div class="stat-pill blue">
            <div class="val">${fmtNum(data.total_import)}</div>
            <div class="lbl">Tổng nhập</div>
          </div>
          <div class="stat-pill amber">
            <div class="val">${fmtNum(data.total_export)}</div>
            <div class="lbl">Tổng xuất</div>
          </div>
        </div>
        <div class="card" style="margin-bottom:0">
          <div class="card-title"><i class="fas fa-list-alt"></i>
            ${data.product_name} – Size ${data.size} &nbsp;|&nbsp; <span style="font-weight:400;font-size:.9rem;color:var(--muted)">đến ${formatDT(data.query_datetime)}</span>
          </div>
          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>Ngày giờ</th><th>Loại</th><th>Số lượng</th>
                  <th>Tồn lũy kế</th><th>Ghi chú</th>
                </tr>
              </thead>
              <tbody>${logsHtml}</tbody>
            </table>
          </div>
        </div>
      `);
    } catch(e) {
      showResult('s1-result', errCard('Lỗi kết nối API: ' + e.message));
    } finally {
      setLoading('s1-btn', false);
    }
  }

  // ─── 2. BÁO CÁO NHẬP XUẤT ────────────────────────────────────────────────
  async function queryReport() {
    const pid  = document.getElementById('s2-product').value;
    const size = document.getElementById('s2-size').value;
    const from = document.getElementById('s2-from').value;
    const to   = document.getElementById('s2-to').value;

    if (!from || !to) return alert('Vui lòng chọn khoảng thời gian!');
    if (from > to)    return alert('Ngày bắt đầu phải ≤ ngày kết thúc!');

    setLoading('s2-btn', true);
    try {
      let url = `${API}?action=import_export_report&from=${from}&to=${to}`;
      if (pid)  url += `&product_id=${pid}`;
      if (size) url += `&size=${size}`;

      const res  = await fetch(url);
      const data = await res.json();
      if (!data.success) { showResult('s2-result', errCard(data.error)); return; }

      const gt = data.grand_total;

      const summaryRows = data.summary.length === 0
        ? '<tr><td colspan="7"><div class="empty-msg"><i class="fas fa-inbox"></i>Không có dữ liệu trong khoảng thời gian này</div></td></tr>'
        : data.summary.map(r => `
            <tr>
              <td class="left">${r.product_name}</td>
              <td>${r.category}</td>
              <td><span class="badge badge-size">${r.size}</span></td>
              <td style="color:#065f46;font-weight:700">+${fmtNum(r.total_import)}</td>
              <td style="color:#991b1b;font-weight:700">-${fmtNum(r.total_export)}</td>
              <td style="font-weight:700;color:${r.net_change>=0?'#065f46':'#991b1b'}">${r.net_change>=0?'+':''}${fmtNum(r.net_change)}</td>
              <td>${r.transaction_count}</td>
            </tr>`).join('');

      const detailRows = data.details.length === 0
        ? '<tr><td colspan="7"><div class="empty-msg"><i class="fas fa-inbox"></i>Không có giao dịch</div></td></tr>'
        : data.details.map(d => `
            <tr>
              <td>${d.created_at_fmt}</td>
              <td class="left">${d.product_name}</td>
              <td><span class="badge badge-size">${d.size}</span></td>
              <td><span class="badge badge-${d.type === 'import' ? 'import' : 'export'}">${d.type==='import'?'Nhập':'Xuất'}</span></td>
              <td style="font-weight:700;color:${d.type==='import'?'#065f46':'#991b1b'}">${d.type==='import'?'+':'-'}${fmtNum(d.quantity)}</td>
              <td>${d.import_price ? fmtCurrency(d.import_price) : '—'}</td>
              <td class="left">${d.note || '—'}</td>
            </tr>`).join('');

      showResult('s2-result', `
        <div class="stat-row">
          <div class="stat-pill blue">
            <div class="val">${fmtNum(gt.total_import)}</div>
            <div class="lbl">Tổng nhập</div>
          </div>
          <div class="stat-pill amber">
            <div class="val">${fmtNum(gt.total_export)}</div>
            <div class="lbl">Tổng xuất</div>
          </div>
          <div class="stat-pill ${gt.net_change >= 0 ? '' : 'red'}">
            <div class="val">${gt.net_change>=0?'+':''}${fmtNum(gt.net_change)}</div>
            <div class="lbl">Thay đổi ròng</div>
          </div>
          <div class="stat-pill">
            <div class="val">${data.summary.length}</div>
            <div class="lbl">Dòng sản phẩm</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title"><i class="fas fa-table"></i> Tổng hợp theo sản phẩm</div>
          <div class="tbl-wrap">
            <table>
              <thead><tr>
                <th>Sản phẩm</th><th>Danh mục</th><th>Size</th>
                <th>Nhập</th><th>Xuất</th><th>Chênh lệch</th><th>Giao dịch</th>
              </tr></thead>
              <tbody>${summaryRows}</tbody>
            </table>
          </div>
        </div>

        <div class="card" style="margin-bottom:0">
          <div class="card-title"><i class="fas fa-list"></i> Chi tiết giao dịch (${data.details.length} dòng)</div>
          <div class="tbl-wrap">
            <table>
              <thead><tr>
                <th>Ngày giờ</th><th>Sản phẩm</th><th>Size</th>
                <th>Loại</th><th>Số lượng</th><th>Đơn giá</th><th>Ghi chú</th>
              </tr></thead>
              <tbody>${detailRows}</tbody>
            </table>
          </div>
        </div>
      `);
    } catch(e) {
      showResult('s2-result', errCard('Lỗi kết nối API: ' + e.message));
    } finally {
      setLoading('s2-btn', false);
    }
  }

  // ─── 3. CẢNH BÁO ────────────────────────────────────────────────────────
  async function queryAlerts() {
    const threshold = parseInt(document.getElementById('s3-threshold').value);
    const includeOut = document.getElementById('s3-include-out').value;

    if (isNaN(threshold) || threshold < 0) return alert('Vui lòng nhập ngưỡng hợp lệ (≥ 0)!');

    setLoading('s3-btn', true);
    try {
      const url = `${API}?action=low_stock_alert&threshold=${threshold}&include_out_of_stock=${includeOut}`;
      const res  = await fetch(url);
      const data = await res.json();
      if (!data.success) { showResult('s3-result', errCard(data.error)); return; }

      let bannerHtml = '';
      if (data.total_alerts === 0) {
        bannerHtml = `<div class="alert-banner info"><i class="fas fa-check-circle"></i> Tất cả sản phẩm đều còn hàng trên ngưỡng ${threshold}. Không có cảnh báo!</div>`;
      } else {
        if (data.out_of_stock_count > 0) bannerHtml += `<div class="alert-banner danger"><i class="fas fa-times-circle"></i> <strong>${data.out_of_stock_count} sản phẩm đã hết hàng hoàn toàn!</strong></div>`;
        if (data.low_stock_count > 0)   bannerHtml += `<div class="alert-banner warning"><i class="fas fa-exclamation-triangle"></i> <strong>${data.low_stock_count} sản phẩm sắp hết hàng</strong> (tồn kho ≤ ${threshold})</div>`;
      }

      const rows = data.alerts.length === 0
        ? '<tr><td colspan="8"><div class="empty-msg"><i class="fas fa-check-circle" style="color:#065f46"></i><br/>Không có sản phẩm nào cần cảnh báo</div></td></tr>'
        : data.alerts.map(a => `
            <tr>
              <td class="left">${a.product_name}</td>
              <td>${a.category}</td>
              <td><span class="badge badge-size">${a.size}</span></td>
              <td>
                <span style="font-size:1.4rem;font-weight:900;color:${a.current_stock===0?'#e63946':a.current_stock<=5?'#d97706':'#f59e0b'}">
                  ${fmtNum(a.current_stock)}
                </span>
              </td>
              <td><span class="badge ${a.alert_level==='out_of_stock'?'badge-out':'badge-low'}">${a.alert_level==='out_of_stock'?'Hết hàng':'Sắp hết'}</span></td>
              <td>${a.avg_import_price ? fmtCurrency(a.avg_import_price) : '—'}</td>
              <td style="font-size:.82rem;color:var(--muted)">${a.last_import_date || '—'}</td>
              <td style="font-size:.82rem;color:var(--muted)">${a.last_export_date || '—'}</td>
            </tr>`).join('');

      showResult('s3-result', `
        ${bannerHtml}
        <div class="stat-row">
          <div class="stat-pill red">
            <div class="val">${data.out_of_stock_count}</div>
            <div class="lbl">Hết hàng</div>
          </div>
          <div class="stat-pill amber">
            <div class="val">${data.low_stock_count}</div>
            <div class="lbl">Sắp hết (≤ ${data.threshold})</div>
          </div>
          <div class="stat-pill">
            <div class="val">${data.total_alerts}</div>
            <div class="lbl">Tổng cảnh báo</div>
          </div>
        </div>
        <div class="card" style="margin-bottom:0">
          <div class="card-title"><i class="fas fa-exclamation-triangle" style="color:#f59e0b"></i> Danh sách cảnh báo – Ngưỡng: ${data.threshold}</div>
          <div class="tbl-wrap">
            <table>
              <thead><tr>
                <th>Sản phẩm</th><th>Danh mục</th><th>Size</th>
                <th>Tồn kho</th><th>Mức độ</th>
                <th>Giá nhập TB</th><th>Nhập cuối</th><th>Xuất cuối</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `);
    } catch(e) {
      showResult('s3-result', errCard('Lỗi kết nối API: ' + e.message));
    } finally {
      setLoading('s3-btn', false);
    }
  }

  // ─── HELPERS ────────────────────────────────────────────────────────────
  function errCard(msg) {
    return `<div class="alert-banner danger"><i class="fas fa-exclamation-circle"></i> ${msg}</div>`;
  }

  function formatDT(dt) {
    // "2025-10-25 23:59:59" → "25/10/2025 23:59"
    try {
      const [d, t] = dt.split(' ');
      const [y,mo,da] = d.split('-');
      return `${da}/${mo}/${y} ${t.slice(0,5)}`;
    } catch { return dt; }
  }
</script>
