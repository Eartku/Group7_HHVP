<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BonSai | Hồ sơ người dùng</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/hover.css" rel="stylesheet" />
    <link href="css/animation.css" rel="stylesheet"/>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="custom-navbar navbar navbar-expand-md navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">BonSai🌱</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarProfile"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarProfile">
          <ul class="custom-navbar-nav navbar-nav ms-auto mb-2 mb-md-0">
            <li><a href="shop1.html" class="hover-text-glow-small">CÂY ĐỂ PHÒNG</a></li>
            <li><a href="shop2.html" class="hover-text-glow-small">CÂY ĐỂ BÀN</a></li>
            <li><a href="shop3.html" class="hover-text-glow-small">CÂY TREO TƯỜNG</a></li>
          </ul>

          <ul class="custom-navbar-cta navbar-nav mb-2 mb-md-0 ms-5">
            <li>
              <a href="index.html" class="nav-link hover-box">
                <div class="front">
                  <img src="images/home.svg" style="scale: 1.3" />
                </div>
                <div class="back"><span>TRANG CHỦ</span></div>
              </a>
            </li>

            <li class="nav-item">
            <input type="checkbox" id="user-toggle" hidden />

            <label for="user-toggle" class="nav-link hover-box-2">
              <div class="front"><img src="images/user.svg" /></div>
              <div class="back"><span>Người dùng</span></div>
            </label>

            <ul class="dropdown">
              <li><a href="profile.html">Hồ sơ cá nhân</a></li>
              <li><a href="orders.html">Lịch sử đơn hàng</a></li>
            </ul>
          </li>

            <li>
              <a class="nav-link hover-box" href="cart.html">
                <div class="front"><img src="images/cart.svg" /></div>
                <div class="back"><span>Giỏ hàng</span></div>
              </a>
            </li>
            <li>
              <a class="nav-link hover-box" href="search.html">
                <div class="front"><img src="images/search.svg" style="scale: 1.5;"/></div>
                <div class="back"><span>Tìm kiếm</span></div>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
      <div class="center-row text-center">
        <h1 class="glow">HỒ SƠ NGƯỜI DÙNG</h1>
      </div>
    </div>

    <!-- Profile Content -->
    <div class="untree_co-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <div class="p-4 p-lg-5 border bg-white rounded-3">
              <form>
                <div class="text-center mb-4 position-relative d-inline-block">
                    <div class="avatar-wrapper position-relative d-inline-block">
                    <img
                        src="images/avatar.svg"
                        alt="Avatar"
                        class="rounded-circle shadow avatar-img"
                        width="120"
                        height="120"
                        />
                        <button type="button" class="btn btn-edit-avatar">
                        <i class="fas fa-camera"></i>
                        </button>
                    </div>
                    <h4 class="mt-3 text-black">Trần Nhựt Huy</h4>
                    </div>

                    

                <div class="mb-3">
                  <label class="text-black">Họ và Tên</label>
                  <input type="text" class="form-control" value="Trần Nhựt Huy" />
                </div>

                <div class="mb-3">
                  <label class="text-black">Công ty</label>
                  <input type="text" class="form-control" value="" />
                </div>

                <div class="mb-3">
                  <label class="text-black">Email</label>
                  <input type="email" class="form-control" value="huy@gmail.com" />
                </div>

                <div class="mb-3">
                  <label class="text-black">Số điện thoại</label>
                  <input type="text" class="form-control" value="03636363636" />
                </div>

                <div class="mb-3">
                  <label class="text-black">Địa chỉ giao hàng</label>
                  <textarea class="form-control" rows="3">320, Trần Bình Trọng, Quận 5, TP.HCM
                  </textarea>
                </div>

                <hr />

                <h5 class="text-black mb-3">Đổi mật khẩu</h5>
                <div class="mb-3">
                  <label class="text-black">Mật khẩu hiện tại</label>
                  <input type="password" class="form-control" />
                </div>
                <div class="mb-3">
                  <label class="text-black">Mật khẩu mới</label>
                  <input type="password" class="form-control" />
                </div>

                <button class="btn btn-dark w-100">Lưu thay đổi</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer-section">
      <div class="container relative">
        <div class="sofa-img">
          <img src="images/senda.png" alt="Image" class="img-fluid" />
        </div>
        <div class="row g-5 mb-5">
          <div class="col-lg-4">
            <div class="mb-4 footer-logo-wrap">
              <a href="#" class="footer-logo">BonSai<span>.</span></a>
            </div>
            <p class="mb-4">Mang đến cho bạn trải nghiệm xanh tốt nhất!</p>
            <ul class="list-unstyled custom-social">
              <li>
                <a href="#"><span class="fa fa-brands fa-facebook-f"></span></a>
              </li>
              <li>
                <a href="#"><span class="fa fa-brands fa-twitter"></span></a>
              </li>
              <li>
                <a href="#"><span class="fa fa-brands fa-instagram"></span></a>
              </li>
              <li>
                <a href="#"><span class="fa fa-brands fa-linkedin"></span></a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
